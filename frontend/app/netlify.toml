# Netlify config for the Reach Social SPA dev deploy.
#
# Connect a separate Netlify site to this repo with:
#   Base directory:    frontend/app
#   Build command:     npm run build
#   Publish directory: frontend/app/dist
#
# The `redirects` rule below makes client-side routing work — every
# unmatched path serves index.html so react-router can handle it.
# Asset URLs (anything under /assets/) are served as-is from dist/.

[build]
  command = "npm run build"
  publish = "dist"

# RULE ORDER MATTERS — Netlify processes redirects top-to-bottom and
# the first match wins. The /api/* and /auth/* proxies must come
# BEFORE the SPA fallback or the catch-all swallows them and returns
# index.html (which causes React-Router to bounce to /brand and the
# OAuth flow silently breaks).

# API pass-through to the Render backend.
[[redirects]]
  from = "/api/*"
  to = "https://liquidretail-backend.onrender.com/api/:splat"
  status = 200
  force = true

# Auth pass-through (Google OAuth start + callback both proxy here).
[[redirects]]
  from = "/auth/*"
  to = "https://liquidretail-backend.onrender.com/auth/:splat"
  status = 200
  force = true

# SPA fallback — every OTHER unmatched path serves index.html so
# /brand, /upload, /detect, /media-library, /ads etc. hydrate the
# React app. Must stay last.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
