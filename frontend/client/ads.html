<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flood QRF — Ad Generation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="auth.js"></script>
  <script src="brandPicker.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Display fonts for testimonial_spotlight's landscape headline.
       Knewave is a brushy display face that approximates the reference's
       hand-painted look; Bungee is the bold-display fallback. Loaded
       page-wide so any preview can swap fonts at render time without a
       fetch round-trip. -->
  <link href="https://fonts.googleapis.com/css2?family=Knewave&family=Bungee&display=swap" rel="stylesheet" />
  <!-- Canvas/template-preview renderer CSS lives in tp-zones.css —
       shared with ai-spec-preview.html so both pages render zones
       the same way. Page-chrome styles stay inline below. -->
  <link rel="stylesheet" href="tp-zones.css" />
  <!-- Phase 0 component-variant CSS (rs-<role>-<component_style>).
       Sits ALONGSIDE tp-zones.css during the migration; renderer adds
       both tp-zone classes and rs-* classes per zone. -->
  <link rel="stylesheet" href="rs-component-variants.css" />
  <style>
    /* Default UI font for the page chrome only — scoped to body so
       .tp-stage descendants can pick up var(--brand-font). The previous
       universal selector won the cascade against .tp-stage's font-family
       rule because * applies to every element including descendants,
       which masked the brand font in every preview. */
    body { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #0a0a0a; color: #f0f0f0; }
    nav  { background: #111; border-bottom: 1px solid #1f1f1f; }

    .section-card { background: #111; border: 1.5px solid #1f1f1f; border-radius: 18px; padding: 24px; }
    .panel-label  { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: #555; margin-bottom: 12px; }

    /* ── Inputs ── */
    .field-input {
      display: block; width: 100%;
      background: #1c1c1e; border: 1.5px solid #2e2e2e;
      color: #f0f0f0; border-radius: 10px;
      padding: 10px 14px; font-size: 0.875rem; outline: none;
      transition: border-color 0.15s;
    }
    .field-input::placeholder { color: #555; }
    .field-input:focus { border-color: #C8102E; }
    input[type="date"], input[type="time"] { color-scheme: dark; color: #f0f0f0; }
    .field-label { display: block; font-size: 0.72rem; font-weight: 600; color: #666;
                   text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }

    /* Brand logo row — small inline picker that sits inside the upload form */
    .brand-logo-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .brand-logo-pick {
      font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px;
      background: #161616; border: 1px solid #2a2a2a; color: #888; cursor: pointer;
      transition: all 0.12s; white-space: nowrap;
    }
    .brand-logo-pick:hover { color: #ccc; border-color: #444; background: #1a1a1a; }
    .brand-logo-preview {
      width: 36px; height: 36px; border-radius: 6px;
      background: #141414; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .brand-logo-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .brand-logo-name { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .brand-logo-clear {
      width: 24px; height: 24px; border-radius: 999px; padding: 0;
      background: transparent; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; line-height: 1; cursor: pointer;
    }
    .brand-logo-clear:hover { border-color: #ef4444; background: rgba(239,68,68,0.08); }

    /* ── Drop zone ── */
    #dropZone {
      border: 2px dashed #2e2e2e; border-radius: 12px;
      background: #141414; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #dropZone:hover     { border-color: #444; background: #1a1a1a; }
    #dropZone.drag-over { border-color: #C8102E; background: #1f1010; }

    /* ── Image containers ── */
    .img-wrap { position: relative; display: inline-block; line-height: 0; }
    .img-wrap img { display: block; width: 100%; border-radius: 8px; }

    /* ── Product bboxes ── */
    .bbox {
      position: absolute; border: 2px solid #f59e0b; border-radius: 4px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s; box-sizing: border-box;
    }
    .bbox:hover { border-color: #fcd34d; }
    .bbox.approved { border-color: #34d399; background: rgba(52,211,153,0.08); }
    .bbox.rejected { border-color: #f87171; background: rgba(248,113,113,0.08); opacity: 0.5; }
    .bbox-label {
      position: absolute; top: -22px; left: -1px;
      background: #f59e0b; color: #000;
      font-size: 10px; font-weight: 700; padding: 1px 6px;
      border-radius: 3px 3px 0 0; white-space: nowrap; transition: background 0.15s;
    }
    .bbox.approved .bbox-label { background: #34d399; }
    .bbox.rejected .bbox-label { background: #f87171; color: #fff; }

    /* ── Subject overlay ── */
    .sbox {
      position: absolute; border-radius: 6px; box-sizing: border-box;
      pointer-events: none;
    }
    .sbox.primary   { border: 2px solid #818cf8; background: rgba(129,140,248,0.08); }
    .sbox.secondary { border: 2px dashed #4f5d87; background: rgba(79,93,135,0.05); }
    .sbox-label {
      position: absolute; top: -22px; left: -1px;
      background: #818cf8; color: #fff;
      font-size: 10px; font-weight: 700; padding: 1px 6px;
      border-radius: 3px 3px 0 0; white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis;
    }
    .sbox.secondary .sbox-label { background: #4f5d87; }

    /* ── Text overlay ── */
    .tbox {
      position: absolute; border: 1.5px solid #f472b6; background: rgba(244,114,182,0.08);
      border-radius: 3px; box-sizing: border-box; pointer-events: none;
    }
    .tbox-label {
      position: absolute; top: -20px; left: -1px;
      background: #f472b6; color: #000;
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 2px 2px 0 0; white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Crop frame overlay ── */
    .crop-frame {
      position: absolute; box-sizing: border-box; border-radius: 4px; pointer-events: none;
      border: 2px solid #60a5fa; background: rgba(96,165,250,0.06);
      transition: opacity 0.2s;
    }
    .crop-frame.winner { border-color: #34d399; border-width: 2.5px; background: rgba(52,211,153,0.1); }
    .crop-frame.dim    { border-color: #2563eb33; opacity: 0.4; }

    /* ── Safe envelope overlay (subject union across frames) ── */
    .safe-envelope {
      position: absolute; box-sizing: border-box; border-radius: 4px; pointer-events: none;
      border: 2px dashed #fbbf24; background: rgba(251,191,36,0.04);
    }
    .safe-envelope-label {
      position: absolute; top: -20px; left: -1px;
      background: #fbbf24; color: #000;
      font-size: 9px; font-weight: 700; padding: 1px 6px;
      border-radius: 3px 3px 0 0; white-space: nowrap;
    }

    /* ── Cards ── */
    .det-card {
      background: #161616; border: 1.5px solid #242424; border-radius: 12px; overflow: hidden;
      transition: border-color 0.15s;
    }
    .det-card.approved { border-color: #34d399; }
    .det-card.rejected { border-color: #f87171; opacity: 0.5; }
    .det-card.winner   { border-color: #34d399; }

    .crop-card {
      background: #161616; border: 1.5px solid #242424; border-radius: 12px; overflow: hidden;
      cursor: pointer; transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      position: relative;
    }
    .crop-card:hover   { border-color: #3a3a3a; transform: translateY(-1px); }
    .crop-card.selected { border-color: #34d399; border-width: 2px; box-shadow: 0 0 0 2px rgba(52,211,153,0.25); }

    /* ── Tabs ── */
    .tab-btn {
      font-size: 0.7rem; font-weight: 700; padding: 6px 14px; border-radius: 8px;
      text-transform: uppercase; letter-spacing: 0.07em; transition: background 0.15s, color 0.15s;
      color: #555; cursor: pointer; border: none; background: transparent;
    }
    .tab-btn.active { background: #1f1f1f; color: #f0f0f0; }

    /* ── Judge badge ── */
    .judge-badge {
      font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .judge-badge.winner { background: #064e3b; color: #34d399; border: 1px solid #065f46; }
    .judge-badge.normal { background: #1c1c1e; color: #555; border: 1px solid #2a2a2a; }

    /* Judge score pill shown per-candidate (right side of thumbnail) */
    .judge-score {
      position: absolute; bottom: 4px; right: 4px;
      background: rgba(0,0,0,0.75); color: #fbbf24;
      font-size: 10px; font-weight: 700; font-family: 'Courier New', monospace;
      padding: 1px 6px; border-radius: 4px; letter-spacing: 0.02em;
    }
    .judge-score.rejected { color: #fca5a5; background: rgba(124, 45, 45, 0.85); }

    /* Rejected candidate overlay */
    .judge-reject-banner {
      position: absolute; left: 0; right: 0; bottom: 0;
      background: rgba(124, 45, 45, 0.85); color: #fecaca;
      font-size: 9px; font-weight: 700; padding: 3px 6px; text-align: center;
      letter-spacing: 0.03em; text-transform: uppercase;
    }
    .crop-card.rejected { opacity: 0.6; }

    /* ── Timestamp chip ── */
    .time-chip {
      font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
      background: #1a2e1a; color: #86efac; border: 1px solid #1a4728; font-family: 'Courier New', monospace;
    }

    /* ── Entity chip ── */
    .entity-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: #1c1c1e; border: 1px solid #2e2e2e; border-radius: 999px;
      padding: 4px 10px; font-size: 11px; color: #f0f0f0;
      margin: 3px; cursor: pointer; transition: background 0.12s, border-color 0.12s;
    }
    .entity-chip:hover { background: #262626; border-color: #3a3a3a; }
    .entity-chip .etype {
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
      padding: 1px 5px; border-radius: 3px; background: #333; color: #aaa;
    }
    .entity-chip[data-type="product"] .etype { background: #4a1d24; color: #fda4af; }
    .entity-chip[data-type="brand"]   .etype { background: #1e3a5c; color: #93c5fd; }
    .entity-chip[data-type="model"]   .etype { background: #3b2a5c; color: #c4b5fd; }
    .entity-chip[data-type="part_number"] .etype { background: #4a3d0a; color: #fde68a; }
    .entity-chip[data-type="quantity"] .etype { background: #1a4728; color: #86efac; }

    /* ── Transcript segment ── */
    .segment-row {
      display: flex; gap: 10px; padding: 6px 4px; border-left: 2px solid transparent;
      cursor: pointer; transition: background 0.12s, border-color 0.12s;
    }
    .segment-row:hover { background: #141414; border-left-color: #C8102E; }
    .segment-row .seg-time {
      font-family: 'Courier New', monospace; font-size: 10px; color: #555;
      flex-shrink: 0; width: 58px; padding-top: 2px;
    }
    .segment-row .seg-text { font-size: 12px; color: #ccc; line-height: 1.5; }
    .segment-row.active { background: #1a0e0e; border-left-color: #f87171; }

    /* ── Inline entity highlight within transcript segments ── */
    mark.entity-highlight {
      background: transparent; color: #f0f0f0; font-weight: 600;
      padding: 0 2px; border-radius: 2px; border-bottom: 2px solid #555;
    }
    mark.entity-highlight[data-type="product"]     { border-bottom-color: #fda4af; }
    mark.entity-highlight[data-type="brand"]       { border-bottom-color: #93c5fd; }
    mark.entity-highlight[data-type="model"]       { border-bottom-color: #c4b5fd; }
    mark.entity-highlight[data-type="part_number"] { border-bottom-color: #fde68a; }
    mark.entity-highlight[data-type="quantity"]    { border-bottom-color: #86efac; }

    /* ── Video timeline markers (product first-seen positions) ── */
    .timeline-wrap { position: relative; }
    .timeline-markers {
      position: absolute; left: 0; right: 0; bottom: 2px; height: 6px;
      pointer-events: none;
    }
    .timeline-marker {
      position: absolute; top: 0; width: 8px; height: 6px;
      background: #f59e0b; border-radius: 2px;
      transform: translateX(-50%); pointer-events: auto; cursor: pointer;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
    }
    .timeline-marker:hover { background: #fcd34d; }
    .timeline-marker .tm-tip {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #000; color: #fff; padding: 2px 6px; border-radius: 3px;
      font-size: 10px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity 0.15s;
    }
    .timeline-marker:hover .tm-tip { opacity: 1; }

    /* ── Stage timings table ── */
    .stage-row {
      display: flex; justify-content: space-between; padding: 4px 8px;
      font-size: 11px; border-bottom: 1px solid #1a1a1a;
    }
    .stage-row:last-child { border-bottom: none; }
    .stage-name { color: #aaa; }
    .stage-time { color: #555; font-family: 'Courier New', monospace; }

    /* ── Hero frame caption ── */
    .hero-caption {
      font-size: 10px; color: #777; margin-top: 6px; padding: 4px 10px;
      background: #1a1a1a; border-radius: 6px; display: inline-block;
    }
    .hero-caption .key { color: #aaa; font-weight: 600; }

    /* ── Provider-failure row ── */
    .provider-fail {
      display: flex; align-items: center; gap: 10px; padding: 6px 10px;
      background: #1a0e0e; border: 1px solid #2a1515; border-radius: 6px;
      font-size: 11px; color: #fca5a5; margin-top: 6px;
    }
    .provider-fail .label { color: #f87171; font-weight: 600; min-width: 110px; }
    .provider-fail .msg   { color: #aaa; font-family: 'Courier New', monospace; font-size: 10px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Product identification hero card ── */
    .id-card {
      display: flex; gap: 16px; padding: 16px;
      background: linear-gradient(135deg, #0f1a24 0%, #141414 100%);
      border: 1px solid #1e3a5c; border-radius: 14px;
    }
    .id-thumb {
      width: 120px; height: 120px; flex-shrink: 0;
      border-radius: 10px; overflow: hidden;
      background: #0a0a0a; display: flex; align-items: center; justify-content: center;
    }
    .id-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .id-thumb.placeholder { font-size: 10px; color: #444; }
    .id-body { flex: 1; min-width: 0; }
    .id-brand { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #60a5fa; }
    .id-name  { font-size: 18px; font-weight: 700; color: #f0f0f0; margin-top: 2px; line-height: 1.2; }
    .id-variant { font-size: 12px; color: #888; margin-top: 2px; }
    .id-reasoning { font-size: 11px; color: #aaa; margin-top: 10px; line-height: 1.5; }
    .id-cta {
      display: inline-flex; align-items: center; gap: 6px;
      background: #1e3a5c; color: #93c5fd; font-size: 11px; font-weight: 600;
      padding: 6px 12px; border-radius: 8px; margin-top: 10px;
      transition: background 0.15s;
    }
    .id-cta:hover { background: #274a73; }
    /* Certainty pill */
    .certainty-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .certainty-pill.high    { background: #052e1a; color: #34d399; border: 1px solid #0a5c36; }
    .certainty-pill.medium  { background: #2e1f05; color: #fbbf24; border: 1px solid #5c3e0a; }
    .certainty-pill.low     { background: #2e0a0a; color: #f87171; border: 1px solid #5c1a1a; }
    .certainty-pill.unknown { background: #1c1c1e; color: #666; border: 1px solid #2a2a2a; }
    .certainty-bar {
      height: 4px; background: #1c1c1e; border-radius: 2px; overflow: hidden; margin-top: 8px;
    }
    .certainty-bar-fill {
      height: 100%; transition: width 0.3s;
    }
    .certainty-bar-fill.high    { background: #34d399; }
    .certainty-bar-fill.medium  { background: #fbbf24; }
    .certainty-bar-fill.low     { background: #f87171; }
    .certainty-bar-fill.unknown { background: #555; }

    /* ── Product details section ── */
    .details-block { margin-top: 16px; }
    .details-section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: #666; margin-bottom: 8px;
    }
    .seller-row {
      display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center;
      padding: 8px 10px; border-bottom: 1px solid #1a1a1a;
      font-size: 12px;
    }
    .seller-row:last-child { border-bottom: none; }
    .seller-row a { color: #60a5fa; }
    .seller-row a:hover { color: #93c5fd; }
    .seller-row .price-cell { color: #34d399; font-family: 'Courier New', monospace; font-weight: 600; }
    .seller-row .shipping-cell { color: #555; font-size: 10px; }

    .stars {
      display: inline-flex; align-items: center; gap: 2px;
      color: #fbbf24; font-size: 13px; line-height: 1;
    }
    .stars .empty { color: #3a3a3a; }

    .review-card {
      background: #161616; border: 1px solid #242424; border-radius: 10px; padding: 12px;
    }
    .review-card .header {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }
    .review-card .author { font-size: 11px; color: #aaa; font-weight: 600; }
    .review-card .date   { font-size: 10px; color: #555; }
    .review-card .title  { font-size: 12px; color: #f0f0f0; font-weight: 600; margin-bottom: 4px; }
    .review-card .text   { font-size: 11px; color: #bbb; line-height: 1.5; }

    .rating-bar {
      display: grid; grid-template-columns: 24px 1fr 32px; gap: 8px; align-items: center;
      font-size: 10px; color: #888; margin-bottom: 2px;
    }
    .rating-bar .bar { height: 4px; background: #1c1c1e; border-radius: 2px; overflow: hidden; }
    .rating-bar .fill { height: 100%; background: #fbbf24; }

    .specs-table { font-size: 11px; color: #aaa; }
    .specs-table dt { color: #666; margin-top: 6px; font-weight: 600; }
    .specs-table dd { color: #ccc; margin-left: 12px; }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulse   { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .spinner  { animation: spin 0.8s linear infinite; }
    .pulse    { animation: pulse 1.5s ease-in-out infinite; }
    .fade-up  { animation: fadeUp 0.25s ease forwards; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    /* ── Overlay Zones (ad-layout preview) ── */
    .oz-card   { background: #0d0d0d; border: 1px solid #1f1f1f; border-radius: 14px; padding: 12px; }
    .oz-stage  { position: relative; width: 100%; background: #000; border-radius: 10px; overflow: hidden; }
    .oz-stage img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .oz-layer  { position: absolute; inset: 0; pointer-events: none; }
    .oz-heatmap { position: absolute; inset: 0; display: grid; pointer-events: none; }

    /* Active (masked-out) restriction — drawn with a dim red overlay + dashed
       outline. Covers part of the image to signal "don't overlay here." */
    .oz-restriction {
      position: absolute; border-radius: 3px;
      border: 1.25px dashed rgba(239, 68, 68, 0.75);
      background: rgba(239, 68, 68, 0.22);
      backdrop-filter: brightness(0.55);
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    }
    .oz-restriction.class-product {
      border-color: rgba(239, 68, 68, 1);
      background: rgba(239, 68, 68, 0.35);
    }
    .oz-restriction.class-face            { border-color: rgba(251, 146, 60, 0.9); background: rgba(251, 146, 60, 0.22); }
    .oz-restriction.class-secondary_subject { border-color: rgba(250, 204, 21, 0.9); background: rgba(250, 204, 21, 0.20); }
    .oz-restriction.class-text            { border-color: rgba(167, 139, 250, 0.9); background: rgba(167, 139, 250, 0.20); }
    .oz-restriction.class-object          { border-color: rgba(148, 163, 184, 0.85); background: rgba(148, 163, 184, 0.18); }

    /* Inactive restriction — below the conservation threshold; shown faintly
       so operators can see what they're trading off when they slide. */
    .oz-restriction.inactive {
      opacity: 0.28;
      background: transparent;
      backdrop-filter: none;
      border-style: dotted;
    }

    .oz-restriction-label {
      position: absolute; top: 2px; left: 2px;
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      color: #fff; background: rgba(0,0,0,0.7); padding: 1px 4px; border-radius: 3px;
      pointer-events: none;
    }

    .oz-controls { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
    .oz-toggle {
      font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 4px 10px; border-radius: 999px;

    /* ── Media picker ribbon — horizontally scrollable strip of 4:5 tiles ── */

    .ads-picker-grid::-webkit-scrollbar-track { background: #161616; border-radius: 4px; }
    .ads-picker-grid::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

    .ads-pick-card {
      position: relative;

      background: #161616;
      border: 1.5px solid #2a2a2a;

      cursor: pointer;
      transition: border-color 0.12s, transform 0.12s;
      scroll-snap-align: start;

    .ads-pick-card:hover { border-color: #444; }

    /* ── Aspect-ratio chip with use-case subtitle ───────────────── */
    .tp-chip.tp-chip-stacked {
      display: flex; flex-direction: column; align-items: center;
      gap: 1px; line-height: 1.1; padding: 5px 10px;
    }
    .tp-chip-main { font-size: 10px; font-weight: 700; }
    .tp-chip-sub  { font-size: 8px; opacity: 0.55; font-family: 'Courier New', monospace; letter-spacing: 0.02em; }

    /* ── Mock phone frame (toggle) ──────────────────────────────── */
    /* When the toggle is on, JS wraps #tpStage inside a .phone-shell.
       Shell paints the iPhone-ish bezel + dynamic-island notch and
       letterboxes the ad content (stage keeps its own aspect-ratio
       and centers in the screen area). */
    .phone-shell {
      position: relative;
      max-width: 320px;
      margin: 0 auto;
      aspect-ratio: 9 / 19.5;       /* portrait phone screen */
      background: #000;
      border-radius: 38px;
      box-shadow:
        0 0 0 3px #2a2a2a,           /* inner bezel ring */
        0 0 0 6px #0a0a0a,           /* outer dark ring */
        0 8px 28px rgba(0,0,0,0.6);  /* drop shadow */
      overflow: hidden;
      padding: 22px 8px 16px;        /* extra top room for the notch */
      display: flex; align-items: center; justify-content: center;
    }
    .phone-shell::before {
      content: "";
      position: absolute; top: 8px; left: 50%;
      transform: translateX(-50%);
      width: 90px; height: 22px;
      background: #0a0a0a;
      border-radius: 999px;
      z-index: 200;
      pointer-events: none;
    }
    /* Frame inside the shell: keeps its aspect ratio + fits the phone screen.
       The stage inside the frame remains at full canvas pixel size + scaled. */
    .phone-shell > #tpStageFrame {
      width: auto;
      max-width: 100%;
      max-height: 100%;
      flex-shrink: 1;
      border: none;
      background: transparent;
    }

    .tp-tab:hover { color: #ccc; }
    .tp-tab.active { color: #fff; border-bottom-color: #ef4444; }
    .tp-tab-pane { display: none; }

    /* Brand object pretty-print */

    .tp-match-winner { font-size: 10px; color: #888; }
    .tp-match-winner code { color: #93c5fd; font-family: 'Courier New', monospace; }
    .tp-match-reasoning { font-size: 11px; color: #ccc; line-height: 1.4; flex-basis: 100%; }

            <button type="button" class="tp-tab"        data-tp-tab="matching" role="tab">Matching</button>
          </div>
          <div id="tpStatus"      class="tp-status tp-tab-pane active" data-tp-pane="debug"    role="tabpanel"></div>
          <div id="tpBrandObject" class="tp-status tp-tab-pane"        data-tp-pane="brand"    role="tabpanel"></div>
          <div id="tpMatching"    class="tp-status tp-tab-pane"        data-tp-pane="matching" role="tabpanel"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Minimal state object shared with templatePreview.js (it reads
    // window.state.mediaId for the active media).
    window.state = { mediaId: null, rights: { approved: false } };

    // Utility the preview module uses for safe HTML embedding.
    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
    window.escapeHtml = escapeHtml;

    // ══════════════════════════════════════════════════════════════
    //  Media picker — pulls /api/media (most recent first), renders
    //  thumbnails, drives state.mediaId on click.
    // ══════════════════════════════════════════════════════════════
    const PICK_STATE = { items: [], readyOnly: true };

    async function loadMediaList() {
      const grid = document.getElementById("adsPickerGrid");
      const meta = document.getElementById("adsPickMetaLine");
      grid.innerHTML = '<p class="ads-pick-empty">Loading media…</p>';
      meta.textContent = "loading…";
      try {
        const url = `/api/media?limit=48${PICK_STATE.readyOnly ? "&ready=true" : ""}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        PICK_STATE.items = data.media || [];
        renderPickerGrid();
        meta.textContent = `${data.media?.length || 0} of ${data.total || 0} media`;
      } catch (err) {
        grid.innerHTML = `<p class="ads-pick-empty">Failed to load: ${escapeHtml(err.message)}</p>`;
        meta.textContent = "";
      }
    }

    function renderPickerGrid() {
      const grid = document.getElementById("adsPickerGrid");
      if (!PICK_STATE.items.length) {
        grid.innerHTML = '<p class="ads-pick-empty">No media yet. Run a detection on the Detection Review page first.</p>';
        return;
      }
      grid.innerHTML = "";
      for (const m of PICK_STATE.items) {
        const card = document.createElement("div");
        card.className = "ads-pick-card" + (m.ready ? "" : " unready") + (state.mediaId === m.mediaId ? " active" : "");
        card.dataset.mediaId = m.mediaId;
        if (m.fileType === "video") {
          card.innerHTML = `<video src="${escapeHtml(m.fileUrl)}" muted preload="metadata" playsinline></video>`;
        } else {
          card.innerHTML = `<img src="${escapeHtml(m.fileUrl)}" alt="${escapeHtml(m.fileName || "")}" loading="lazy" />`;
        }
        // Source pill: IG-sourced media gets a colored pill so it's
        // distinguishable at a glance from manual uploads.
        const sourcePill = mediaSourcePillHtml(m);
        if (sourcePill) card.insertAdjacentHTML("afterbegin", sourcePill);
        const date = m.createdAt ? new Date(m.createdAt).toLocaleDateString() : "";
        card.insertAdjacentHTML("beforeend",
          `<div class="ads-pick-meta">` +
            (m.brand ? `<div class="brand">${escapeHtml(m.brand)}</div>` : "") +
            (date ? `<div class="date">${escapeHtml(date)}</div>` : "") +
          `</div>`
        );
        card.addEventListener("click", () => pickMedia(m.mediaId));
        grid.appendChild(card);
      }
    }

    // Returns a small overlay pill HTML for IG-sourced Media. Manual
    // uploads return empty string so we don't clutter their cards.
    function mediaSourcePillHtml(m) {
      if (m.source !== 'instagram') return '';
      const isReel = (m.postType || '').toUpperCase() === 'VIDEO' || (m.postType || '').toUpperCase() === 'REEL';
      const label = isReel ? 'IG Reel' : 'IG Post';
      return `<span class="ads-pick-source-pill" title="Ingested from Instagram">${escapeHtml(label)}</span>`;
    }

    function pickMedia(mediaId) {
      if (!mediaId) return;
      state.mediaId = mediaId;
      document.querySelectorAll(".ads-pick-card").forEach(c => {
        c.classList.toggle("active", c.dataset.mediaId === mediaId);
      });
      const m = PICK_STATE.items.find(x => x.mediaId === mediaId);
      state.rights = { approved: !!m?.rightsApproved };
      document.getElementById("templatePreviewPanel").classList.remove("hidden");
      if (window.renderTemplatePreview) window.renderTemplatePreview();
    }

    document.getElementById("adsPickReadyToggle").addEventListener("click", (e) => {
      PICK_STATE.readyOnly = !PICK_STATE.readyOnly;
      e.currentTarget.classList.toggle("active", PICK_STATE.readyOnly);
      loadMediaList();
    });

    // Reload media list when the nav brand picker switches brands —
    // the X-Brand-Id header changes implicitly via auth.js, but we
    // need to re-fire the request to see the new tenant's media.
    window.addEventListener('brand:change', () => {
      // Clear current selection so the preview panel hides.
      state.mediaId = null;
      document.getElementById('templatePreviewPanel').classList.add('hidden');
      loadMediaList();
    });

    // ── Render mode (Puppeteer-driven screenshot path) ──────────────
    // When the page is loaded with ?renderMode=1&media=X&template=Y&
    // ratio=Z, skip the media picker UI entirely, drive the preview
    // directly from URL params, hide all chrome, and set
    // window.__tpRenderReady once the post-RAF reflow + auto-fit
    // settle. The render service waits on that flag, then screenshots
    // #tpStage. Outside render mode, the existing operator-driven
    // bootstrap (loadMediaList) runs as before.
    //
    // Wrapped in DOMContentLoaded because templatePreview.js loads
    // AFTER this inline script — without the wait, the bootstrap's
    // `window.renderTemplatePreview && ...` short-circuits to undefined
    // and the chain resolves without ever calling the renderer,
    // leaving the stage 0×0 and tpStatus empty.
    document.addEventListener('DOMContentLoaded', function bootstrap() {
      const params = new URLSearchParams(window.location.search);
      const renderModeRaw = params.get('renderMode') || '';
      const renderMode = renderModeRaw === '1' || renderModeRaw === 'video-overlay';
      const videoOverlayMode = renderModeRaw === 'video-overlay';
      if (!renderMode) {
        loadMediaList();
        return;
      }
      const mediaParam   = params.get('media');
      const templateParam = params.get('template');
      const ratioParam    = params.get('ratio');
      // Render-mode fetches by FK to a stored LayoutInputArtifact, not
      // by re-deriving via POST /api/layout-input. The render service
      // queues the artifact at deriveStage; we just look it up by id.
      // Eliminates the entire cache-miss-rebuild class (which was
      // timing out at Netlify's 30s gateway when campaignContextHash
      // drifted between expand-time and render-time inputs).
      const layoutInputArtifactIdParam = params.get('layoutInputArtifactId') || null;
      if (!mediaParam || !templateParam || !ratioParam) {
        document.body.innerHTML =
          '<div style="padding:20px;font-family:system-ui;color:#900;">renderMode: missing required params media/template/ratio</div>';
        return;
      }
      // Hide page chrome — only the canvas stage should be visible
      // when Puppeteer screenshots. Padding zero so the stage
      // anchors at (0,0) for clean clipping.
      document.body.classList.add('render-mode');
      if (videoOverlayMode) {
        document.documentElement.classList.add('render-mode-video-overlay');
        document.body.classList.add('render-mode-video-overlay');
      }
      // The body.render-mode > * { display:none } rule hides every
      // direct child of body. #tpStage is several levels deep —
      // its display:block !important loses to an ancestor's
      // display:none (descendants of display:none don't render at
      // all). Walk the ancestor chain and force each one visible
      // so #tpStage actually lays out and Puppeteer can screenshot it.
      (function unhideStageAncestors() {
        let cur = document.getElementById('tpStage');
        while (cur && cur !== document.body) {
          cur.style.setProperty('display', 'block', 'important');
          cur.style.setProperty('visibility', 'visible', 'important');
          cur = cur.parentElement;
        }
      })();
      // Drive the preview state directly, then signal ready.
      state.mediaId = mediaParam;
      state.rights = { approved: true };  // render path trusts the source
      // Force the requested template + ratio so renderTemplatePreview
      // doesn't pick a default for us. layoutInputArtifactId tells the
      // preview to fetch by FK rather than POST-rebuild.
      window.__tpRenderForce = {
        template:               templateParam,
        ratio:                  ratioParam,
        layoutInputArtifactId:  layoutInputArtifactIdParam
      };
      document.getElementById('templatePreviewPanel').classList.remove('hidden');
      // Wait for every <img> inside #tpStage to finish loading (or
      // error) so the screenshot doesn't capture half-decoded media.
      // Also waits on document.fonts.ready so headline/quote text
      // doesn't FOUC mid-screenshot. Resolves on a 6s safety timeout
      // — slow CDN or 404 image shouldn't block the entire render.
      function waitForStageAssets() {
        const stage = document.getElementById('tpStage');
        if (!stage) return Promise.resolve();
        const imgs = Array.from(stage.querySelectorAll('img'));
        const imgPromises = imgs.map(img => {
          if (img.complete && img.naturalWidth > 0) return Promise.resolve();
          return new Promise(resolve => {
            const done = () => { img.removeEventListener('load', done); img.removeEventListener('error', done); resolve(); };
            img.addEventListener('load',  done);
            img.addEventListener('error', done);
          });
        });
        const fonts = (document.fonts && document.fonts.ready) || Promise.resolve();
        const safety = new Promise(r => setTimeout(r, 6000));
        return Promise.race([Promise.all([...imgPromises, fonts]), safety]);
      }

      Promise.resolve()
        .then(() => window.renderTemplatePreview && window.renderTemplatePreview())
        .then(() => waitForStageAssets())
        .then(() => {
          // Two RAFs to ensure post-fit + DOM commit.
          requestAnimationFrame(() => requestAnimationFrame(() => {
            // Pre-flight: renderTemplatePreview / loadAndDrawPreview
            // swallow API + draw errors into #tpStatus and resolve
            // anyway, which would let the renderer think we're done
            // and screenshot an empty 0×0 stage. Verify the stage
            // actually drew before signaling ready; otherwise lift
            // tpStatus into __tpRenderError so the render service
            // sees the real reason.
            const stage  = document.getElementById('tpStage');
            const status = document.getElementById('tpStatus');
            const rect   = stage?.getBoundingClientRect();
            if (!rect || !rect.width || !rect.height) {
              const statusText = (status?.textContent || '').trim();
              const reason     = statusText || `stage zero-size with no tpStatus message (innerHTML.len=${stage?.innerHTML?.length || 0})`;
              console.error('[render-mode] stage drew zero-size — ' + reason);
              window.__tpRenderError = reason;
              window.__tpRenderReady = false;
              return;
            }
            window.__tpRenderReady = true;
          }));
        })
        .catch(err => {
          const msg = String(err && err.message || err);
          console.error('[render-mode] bootstrap chain rejected — ' + msg);
          window.__tpRenderError = msg;
          window.__tpRenderReady = false;
        });
    });
  </script>

  <script src="templatePreview.js"></script>

</body>
</html>
