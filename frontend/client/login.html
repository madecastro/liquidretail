<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flood QRF — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              red: '#C8102E',
              navy: '#0A2240',
              black: '#0D0D0D',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="auth.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background-color: #0D0D0D; }
    .stripe-bg {
      background: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 40px,
        rgba(200, 16, 46, 0.04) 40px,
        rgba(200, 16, 46, 0.04) 80px
      );
    }
    .google-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(200,16,46,0.35); }
    .google-btn:active { transform: translateY(0); }
    .google-btn { transition: all 0.2s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .fade-up-delay { animation: fadeUp 0.5s ease 0.15s forwards; opacity: 0; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center stripe-bg font-sans">

  <!-- Background glow -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full bg-brand-red opacity-5 blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-sm mx-4">

    <!-- Card -->
    <div class="fade-up bg-white/5 border border-white/10 rounded-2xl p-8 backdrop-blur-sm shadow-2xl">

      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <img src="assets/logo.png" alt="Flood QRF" class="w-28 h-28 object-contain drop-shadow-lg" />
      </div>

      <!-- Heading -->
      <div class="text-center mb-8">
        <h1 class="text-white text-2xl font-bold tracking-wide uppercase">Flood QRF</h1>
        <p class="text-white/40 text-sm mt-1 tracking-wider uppercase">Inventory Management Portal</p>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-3 mb-6">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-white/25 text-xs uppercase tracking-widest">Staff Access</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <!-- Error message (shown when ?error=1) -->
      <div id="error-msg" class="hidden mb-4 bg-brand-red/10 border border-brand-red/30 rounded-lg px-4 py-3 text-brand-red text-sm text-center">
        Access denied. Only <strong>@floodqrf.com</strong> accounts are authorized.
      </div>

      <!-- Google Sign In Button -->
      <a href="https://liquidretail-backend.onrender.com/auth/google"
         class="google-btn flex items-center justify-center gap-3 w-full bg-brand-red hover:bg-red-700 text-white font-semibold py-3.5 px-6 rounded-xl cursor-pointer">
        <!-- Google G icon -->
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#fff"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#fff"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#fff"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#fff"/>
        </svg>
        Sign in with Google
      </a>

      <!-- Footer note -->
      <p class="text-white/25 text-xs text-center mt-5 leading-relaxed">
        Restricted to <span class="text-white/40 font-medium">@floodqrf.com</span> accounts only.<br/>
        Contact your administrator for access.
      </p>

    </div>

    <!-- Bottom label -->
    <p class="fade-up-delay text-white/15 text-xs text-center mt-5 tracking-wide uppercase">
      Powered by Flood QRF &copy; 2026
    </p>

  </div>

  <script>
    if (new URLSearchParams(window.location.search).get('error')) {
      document.getElementById('error-msg').classList.remove('hidden');
    }
  </script>

</body>
</html>
